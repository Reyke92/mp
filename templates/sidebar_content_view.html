{% extends 'base.html' %}
{% block content %}
<div class="container-fluid min-vh-100">
    <div class="row g-4 py-3">
        {% if user.is_authenticated %}
        <div class="col-12 col-lg-3 col-xl-2">
            <aside class="card shadow-sm border-0 h-100">
                <div class="card-body p-3">
                    <h2 class="h5 mb-3">Navigation</h2>
                    <div class="nav nav-pills flex-column gap-2 sidebar-nav-card">
                        <a class="nav-link {% if active_sidebar_item == 'home' %}active{% endif %}" href="{% url 'home' %}">Home</a>
                        <a class="nav-link {% if active_sidebar_item == 'my_listings' %}active{% endif %}" href="{% url 'my_listings' %}">My Listings</a>
                        <a class="nav-link {% if active_sidebar_item == 'create_listing' %}active{% endif %}" href="{% url 'create_listing' %}">Create Listing</a>
                        <a class="nav-link disabled" href="#" aria-disabled="true">Messages</a>
                        <a class="nav-link {% if active_sidebar_item == 'profile' %}active{% endif %}" href="{% url 'profile' %}">Profile</a>
                    </div>
                </div>
            </aside>
        </div>

        <div class="col-12 col-lg-9 col-xl-10">
        {% else %}
        <div class="col-12">
        {% endif %}
            {% block page_content %}
            {% endblock %}
        </div>
    </div>
</div>
{% endblock %}
